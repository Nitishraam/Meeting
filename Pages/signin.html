<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    @import url('https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Figtree:ital,wght@0,300..900;1,300..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Oswald:wght@200..700&family=Overpass:ital,wght@0,100..900;1,100..900&family=PT+Sans:ital,wght@0,400;0,700;1,400;1,700&family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&family=Play:wght@400;700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&family=Share+Tech&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Ysabeau+Office:ital,wght@0,1..1000;1,1..1000&display=swap');
*{
margin:0;
padding:0;
box-sizing:border-box;
  font-family: "Overpass", sans-serif;
}


body{
margin:0;
font-family:Segoe UI;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#6264A7,#464775);
}

.form-container{
background:white;
padding:35px;
border-radius:10px;
width:320px;
position:relative;
}

.close-btn{
position:absolute;
top:10px;
right:15px;
font-size:22px;
text-decoration:none;
color:#555;
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ccc;
border-radius:5px;
}

a.submit-btn{
display:block;
text-align:center;
padding:12px;
background:#5B5FC7;
color:white;
border-radius:5px;
margin-top:10px;
text-decoration:none;
transition:0.3s;
}

a.submit-btn:hover{
background:#4447b8;
}

.error{
color:red;
font-size:13px;
}

.switch{
text-align:center;
margin-top:15px;
font-size:14px;
}

.switch a{
color:#5B5FC7;
text-decoration:none;
}

.forgot{
text-align:right;
font-size:13px;
}

.forgot a{
text-decoration:none;
color:#5B5FC7;
}

.divider{
text-align:center;
margin:15px 0;
color:#999;
}

.social-btn{
display:flex;
justify-content:center;
gap:10px;
}

.social-btn a{
flex:1;
text-align:center;
padding:10px;
border-radius:5px;
text-decoration:none;
color:white;
font-size:14px;
}

.google{
background:#DB4437;
}

.github{
background:#333;
}

</style>
</head>

<body>

<div class="form-container">

<a href="../index.html" class="close-btn">✕</a>

<h2>Sign In</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<div class="forgot">
<a href="./error.html">Forgot Password?</a>
</div>

<p class="error" id="error"></p>

<a href="./error.html" class="submit-btn" onclick="signin()">Sign In</a>

<div class="divider">OR</div>

<div class="social-btn">
<a href="./error.html" class="google"><i class="fa-brands fa-google"></i> Google</a>
<a href="./error.html" class="github"><i class="fa-brands fa-github"></i> GitHub</a>
</div>

<div class="switch">
Don't have an account? <a href="./signup.html">Sign Up</a>
</div>

</div>

<script>

function signin(){

let password=document.getElementById("password").value
let error=document.getElementById("error")

if(password.length<6){

error.innerText="Password must be at least 6 characters"

}else{

window.location.href="error.html"

}

}

</script>

</body>
</html>
