<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In</title>

<style>

body{
margin:0;
font-family:Segoe UI;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#6264A7,#464775);
}

.form-container{
background:white;
padding:35px;
border-radius:10px;
width:320px;
position:relative;
}

.close-btn{
position:absolute;
top:10px;
right:15px;
font-size:22px;
text-decoration:none;
color:#555;
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ccc;
border-radius:5px;
}

a.submit-btn{
display:block;
text-align:center;
padding:12px;
background:#5B5FC7;
color:white;
border-radius:5px;
margin-top:10px;
text-decoration:none;
}

.error{
color:red;
font-size:13px;
}

.switch{
text-align:center;
margin-top:15px;
font-size:14px;
}

.switch a{
color:#5B5FC7;
text-decoration:none;
}

</style>
</head>

<body>

<div class="form-container">

<a href="../index.html" class="close-btn">✕</a>

<h2>Sign In</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<p class="error" id="error"></p>

<a href="#" class="submit-btn" onclick="signin()">Sign In</a>

<div class="switch">
Don't have an account? <a href="signup.html">Sign Up</a>
</div>

</div>

<script>

function signin(){

let password=document.getElementById("password").value
let error=document.getElementById("error")

if(password.length<6){

error.innerText="Password must be at least 6 characters"

}else{

window.location.href="error.html"

}

}

</script>

</body>
</html>
